name: Run java tests

on:
  # this workflow is only called by others, won't be executed on itself
  workflow_call:

permissions:
  contents: read

jobs:
  run-tests:
    name: Run java tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Start e2e env
        uses: HSLdevcom/jore4-tools/github-actions/setup-e2e-environment@setup-e2e-environment-v10
        with:
          custom_docker_compose: ./docker/docker-compose.custom.yml
          start_jore3_importer: "true"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          java-package: jdk
          architecture: x64
          distribution: temurin
          cache: maven

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Create stop-registry importer virtualenv
        # The Spring Batch job runs the external stop-registry importer Python script as
        # its final step. Create the virtualenv and install its dependencies so the step
        # can run during the Java integration tests (see the `ci` profile config).
        run: |
          python -m venv stop-registry-importer/.venv-stop-registry
          stop-registry-importer/.venv-stop-registry/bin/python -m pip install --upgrade pip
          stop-registry-importer/.venv-stop-registry/bin/pip install -r stop-registry-importer/requirements.txt

      - name: Verify whether test postgresql db is up
        uses: HSLdevcom/jore4-tools/github-actions/healthcheck@healthcheck-v1
        with:
          # testing whether tcp port 17000 responds
          command: "pg_isready -h localhost -p 17000"

      - name: Run tests and try building a package
        run: mvn --batch-mode clean verify -Pci
